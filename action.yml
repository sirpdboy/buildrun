name: "Build Passwall run files"
description: "Build Passwall run file as a reusable composite action"
author: "sirpdboy"
branding:
  icon: 'package'
  color: 'green'

inputs:
  OUTPUT_DIR:
    description: "Output directory for run file"
    required: false
    default: "./passwall"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch latest release tag from Passwall
      id: fetch_latest_tag
      shell: bash
      run: |
        latest_tag=$(curl -s https://api.github.com/repos/Openwrt-Passwall/openwrt-passwall/releases/latest | jq -r '.tag_name')
        echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
        mkdir -p ${{ inputs.OUTPUT_DIR }}
        echo "Latest tag: $latest_tag"

    - name: Clone makeself repository
      shell: bash
      run: |
        if [ ! -d "makeself" ]; then
          git clone https://github.com/megastep/makeself.git
        fi

    - name: Download latest Passwall files
      shell: bash
      run: |
        mkdir -p downloads
        cd downloads
        
        PACKAGES=(
          "passwall_packages_ipk_x86_64.zip"
          "passwall_packages_apk_x86_64.zip"
          "passwall_packages_ipk_aarch64_cortex-a53.zip"
          "passwall_packages_apk_aarch64_cortex-a53.zip"
        )
        TAG=26.1.13-1
        for pkg in "${PACKAGES[@]}"; do
          echo "Downloading: $pkg"
          curl -L -o "$pkg" \
            "https://github.com/Openwrt-Passwall/openwrt-passwall/releases/download/$TAG/$pkg" || echo "Warning: Failed to download $pkg" || true
        done
 
        echo "Fetching release info..."
        RELEASE_INFO=$(curl -s https://api.github.com/repos/Openwrt-Passwall/openwrt-passwall/releases/latest)
    
        echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | test("luci.*\\.(ipk|apk)$")) | .browser_download_url' | \
        while IFS= read -r url; do
        if [[ -z "$url" || "$url" == "null" || ! "$url" =~ ^https?:// ]]; then
        echo "Skipping invalid URL: $url"
        continue
        fi
      
        filename=$(basename "$url")
        echo "Downloading: $filename from $url"
        if curl -L -f -o "$filename" "$url"; then
        echo "Successfully downloaded: $filename"
        else
        echo "Failed to download: $filename"
        fi
        done
           
        echo "Downloaded files in downloads directory:"
        ls -la

    - name: Extract and organize ipk files for x86_64
      shell: bash
      run: |
        mkdir -p passwall_x86_64_ipk/depends passwall_x86_64_ipk/luci
        if [ -f downloads/passwall_packages_ipk_x86_64.zip ]; then
          unzip -q downloads/passwall_packages_ipk_x86_64.zip -d passwall_x86_64_ipk/depends
          rm downloads/passwall_packages_ipk_x86_64.zip
        fi
        cp downloads/luci*.ipk passwall_x86_64_ipk/luci/ 2>/dev/null || true
        echo "x86_64 ipk files organized"

    - name: Extract and organize apk files for x86_64
      shell: bash
      run: |
        mkdir -p passwall_x86_64_apk/depends passwall_x86_64_apk/luci
        if [ -f downloads/passwall_packages_apk_x86_64.zip ]; then
          unzip -q downloads/passwall_packages_apk_x86_64.zip -d passwall_x86_64_apk/depends
          rm downloads/passwall_packages_apk_x86_64.zip
        fi
        cp downloads/luci*.apk passwall_x86_64_apk/luci/ 2>/dev/null || true
        echo "x86_64 apk files organized"

    - name: Extract and organize ipk files for aarch64_cortex-a53
      shell: bash
      run: |
        mkdir -p passwall_aarch64_ipk/depends passwall_aarch64_ipk/luci
        if [ -f downloads/passwall_packages_ipk_aarch64_cortex-a53.zip ]; then
          unzip -q downloads/passwall_packages_ipk_aarch64_cortex-a53.zip -d passwall_aarch64_ipk/depends
          rm downloads/passwall_packages_ipk_aarch64_cortex-a53.zip
        fi
        cp downloads/luci*.ipk passwall_aarch64_ipk/luci/ 2>/dev/null || true
        echo "aarch64 ipk files organized"

    - name: Extract and organize apk files for aarch64_cortex-a53
      shell: bash
      run: |
        mkdir -p passwall_aarch64_apk/depends passwall_aarch64_apk/luci
        if [ -f downloads/passwall_packages_apk_aarch64_cortex-a53.zip ]; then
          unzip -q downloads/passwall_packages_apk_aarch64_cortex-a53.zip -d passwall_aarch64_apk/depends
          rm downloads/passwall_packages_apk_aarch64_cortex-a53.zip
        fi
        cp downloads/luci*.apk passwall_aarch64_apk/luci/ 2>/dev/null || true
        echo "aarch64 apk files organized"

    - name: Create install.sh scripts
      shell: bash
      run: |
        cat <<'EOF' > passwall_x86_64_ipk/install.sh
        #!/bin/sh
        # OpenWrt opkg
        echo "Installing Passwall for OpenWrt..."
        opkg update
        if [ $? -ne 0 ]; then
            echo "opkg update failed"
            exit 1
        fi
        opkg install iptables-mod-tproxy iptables-mod-socket iptables-mod-iprange iptables-mod-conntrack-extra
        opkg install depends/*.ipk
        opkg install luci/*.ipk
        echo "Passwall installation completed for OpenWrt"
        EOF
        chmod +x passwall_x86_64_ipk/install.sh
        cp passwall_x86_64_ipk/install.sh passwall_aarch64_ipk/install.sh

        cat <<'EOF' > passwall_x86_64_apk/install.sh
        #!/bin/sh
        # Alpine Linux apk 
        echo "Installing Passwall for Alpine Linux..."
        apk update
        if [ $? -ne 0 ]; then
            echo "apk update failed"
            exit 1
        fi
        
        apk add iptables-mod-tproxy iptables-mod-socket iptables-mod-iprange iptables-mod-conntrack-extra
        
        for pkg in depends/*.apk luci/*.apk; do
            if [ -f "$pkg" ]; then
                apk add --force --allow-untrusted "$pkg"
            fi
        done
        
        echo "Passwall installation completed for Alpine Linux (forced mode)"
        EOF
        chmod +x passwall_x86_64_apk/install.sh
        cp passwall_x86_64_apk/install.sh passwall_aarch64_apk/install.sh
        
        echo "Install scripts created"

    - name: Move passwall directories to makeself
      shell: bash
      run: |
        mkdir -p makeself
        mv passwall_x86_64_ipk makeself/
        mv passwall_aarch64_ipk makeself/
        mv passwall_x86_64_apk makeself/
        mv passwall_aarch64_apk makeself/
        echo "Directories moved to makeself/"

    - name: Create self-extracting packages
      shell: bash
      run: |
        cd makeself
        
        # 确保makeself脚本可执行
        chmod +x makeself.sh
        
        # 创建IPK包
        if [ -d "passwall_x86_64_ipk" ]; then
          ./makeself.sh passwall_x86_64_ipk passwall_x86_64_ipk_${{ env.LATEST_TAG }}.run "Passwall installer for OpenWrt x86_64" ./install.sh
        fi
        
        if [ -d "passwall_aarch64_ipk" ]; then
          ./makeself.sh passwall_aarch64_ipk passwall_aarch64_a53_ipk_${{ env.LATEST_TAG }}.run "Passwall installer for OpenWrt aarch64" ./install.sh
        fi
        
        # 创建APK包
        if [ -d "passwall_x86_64_apk" ]; then
          ./makeself.sh passwall_x86_64_apk passwall_x86_64_apk_${{ env.LATEST_TAG }}.run "Passwall installer for Alpine Linux x86_64" ./install.sh
        fi
        
        if [ -d "passwall_aarch64_apk" ]; then
          ./makeself.sh passwall_aarch64_apk passwall_aarch64_a53_apk_${{ env.LATEST_TAG }}.run "Passwall installer for Alpine Linux aarch64" ./install.sh
        fi
        
        echo "Self-extracting packages created:"
        ls -lh *.run

    - name: Copy files to output directory
      shell: bash
      run: |
        cp makeself/*.run ${{ inputs.OUTPUT_DIR }} 2>/dev/null || true
        echo "Files copied to ${{ inputs.OUTPUT_DIR }}"
        ls -lh ${{ inputs.OUTPUT_DIR }}
