name: "Build Passwall run files"
description: "Build Passwall run file with FW3 (iptables) and FW4 (nftables) support"
author: "sirpdboy"
branding:
  icon: 'package'
  color: 'green'

inputs:
  OUTPUT_DIR:
    description: "Output directory for run file"
    required: false
    default: "./passwall"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch latest release tag from Passwall
      id: fetch_latest_tag
      shell: bash
      run: |
        latest_tag=$(curl -s https://api.github.com/repos/Openwrt-Passwall/openwrt-passwall/releases/latest | jq -r '.tag_name')
        echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
        mkdir -p ${{ inputs.OUTPUT_DIR }}
        echo "Latest tag: $latest_tag"

    - name: Clone makeself repository
      shell: bash
      run: |
        if [ ! -d "makeself" ]; then
          git clone https://github.com/megastep/makeself.git
        fi

    - name: Create directory structure for FW3 and FW4
      shell: bash
      run: |
        rm -rf passwall*
        mkdir -p passwall-fw3-ipk-x86 passwall-fw3-ipk-a53
        mkdir -p passwall-fw3-apk-x86 passwall-fw3-apk-a53
        
        mkdir -p passwall-fw4-ipk-x86 passwall-fw4-ipk-a53
        mkdir -p passwall-fw4-apk-x86 passwall-fw4-apk-a53
        
        mkdir -p downloads
        echo "Directory structure created"

    - name: Download latest Passwall files
      shell: bash
      run: |
        cd downloads
        
        PACKAGES=(
          "passwall_packages_ipk_x86_64.zip"
          "passwall_packages_apk_x86_64.zip"
          "passwall_packages_ipk_aarch64_cortex-a53.zip"
          "passwall_packages_apk_aarch64_cortex-a53.zip"
        )
        TAG=26.1.13-1
        for pkg in "${PACKAGES[@]}"; do
          echo "Downloading: $pkg"
          curl -L -o "$pkg" \
            "https://github.com/Openwrt-Passwall/openwrt-passwall/releases/download/$TAG/$pkg" || echo "Warning: Failed to download $pkg" || true
        done
        
        RELEASE_INFO=$(curl -s https://api.github.com/repos/Openwrt-Passwall/openwrt-passwall/releases/latest)
        echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("luci-app-passwall") or contains("luci-i18n-passwall-zh-cn")) | "\(.name)|\(.browser_download_url)"' | while IFS='|' read -r name url; do
          if [ -n "$url" ] && [ "$url" != "null" ]; then
            echo "Downloading: $name"
            curl -L -f -o "$name" "$url" || echo "Warning: Failed to download $name"
          fi
        done
        
        echo "Download completed"
        ls -la

    - name: Extract and organize packages for FW3 (iptables)
      shell: bash
      run: |
        pushd "downloads" >/dev/null || continue
        for file in *luci*; do
              [ -e "$file" ] || continue
              new_file="$(echo "$file" | cut -d'_' -f2-)"
              if [ ! -e "$new_file" ]; then
                mv "$file" "$new_file"
                echo "Renamed: $file -> $new_file"
              fi
            done
        popd >/dev/null

        # FW3 + IPK x86_64
        mkdir -p passwall-fw3-ipk-x86/depends passwall-fw3-ipk-x86/luci
        if [ -f downloads/passwall_packages_ipk_x86_64.zip ]; then
          unzip -q downloads/passwall_packages_ipk_x86_64.zip -d passwall-fw3-ipk-x86/depends
        fi
        cp downloads/luci*.ipk passwall-fw3-ipk-x86/luci/ 2>/dev/null || true
        
        # FW3 + IPK aarch64
        mkdir -p passwall-fw3-ipk-a53/depends passwall-fw3-ipk-a53/luci
        if [ -f downloads/passwall_packages_ipk_aarch64_cortex-a53.zip ]; then
          unzip -q downloads/passwall_packages_ipk_aarch64_cortex-a53.zip -d passwall-fw3-ipk-a53/depends
        fi
        cp downloads/luci*.ipk passwall-fw3-ipk-a53/luci/ 2>/dev/null || true
        
        # FW3 + APK x86_64
        mkdir -p passwall-fw3-apk-x86/depends passwall-fw3-apk-x86/luci
        if [ -f downloads/passwall_packages_apk_x86_64.zip ]; then
          unzip -q downloads/passwall_packages_apk_x86_64.zip -d passwall-fw3-apk-x86/depends
        fi
        cp downloads/luci*.apk passwall-fw3-apk-x86/luci/ 2>/dev/null || true
        
        # FW3 + APK aarch64
        mkdir -p passwall-fw3-apk-a53/depends passwall-fw3-apk-a53/luci
        if [ -f downloads/passwall_packages_apk_aarch64_cortex-a53.zip ]; then
          unzip -q downloads/passwall_packages_apk_aarch64_cortex-a53.zip -d passwall-fw3-apk-a53/depends
        fi
        cp downloads/luci*.apk passwall-fw3-apk-a53/luci/ 2>/dev/null || true
        
        echo "FW3 packages organized"

    - name: Extract and organize packages for FW4 (nftables)
      shell: bash
      run: |
        # FW4 + IPK x86_64
        mkdir -p passwall-fw4-ipk-x86/depends passwall-fw4-ipk-x86/luci
        if [ -f downloads/passwall_packages_ipk_x86_64.zip ]; then
          unzip -q downloads/passwall_packages_ipk_x86_64.zip -d passwall-fw4-ipk-x86/depends
        fi
        cp downloads/luci* passwall-fw4-ipk-x86/luci/ 2>/dev/null || true
        
        # FW4 + IPK aarch64
        mkdir -p passwall-fw4-ipk-a53/depends passwall-fw4-ipk-a53/luci
        if [ -f downloads/passwall_packages_ipk_aarch64_cortex-a53.zip ]; then
          unzip -q downloads/passwall_packages_ipk_aarch64_cortex-a53.zip -d passwall-fw4-ipk-a53/depends
        fi
        cp downloads/luci*.ipk passwall-fw4-ipk-a53/luci/ 2>/dev/null || true
        
        # FW4 + APK x86_64
        mkdir -p passwall-fw4-apk-x86/depends passwall-fw4-apk-x86/luci
        if [ -f downloads/passwall_packages_apk_x86_64.zip ]; then
          unzip -q downloads/passwall_packages_apk_x86_64.zip -d passwall-fw4-apk-x86/depends
        fi
        cp downloads/luci*.apk passwall-fw4-apk-x86/luci/ 2>/dev/null || true
        
        # FW4 + APK aarch64
        mkdir -p passwall-fw4-apk-a53/depends passwall-fw4-apk-a53/luci
        if [ -f downloads/passwall_packages_apk_aarch64_cortex-a53.zip ]; then
          unzip -q downloads/passwall_packages_apk_aarch64_cortex-a53.zip -d passwall-fw4-apk-a53/depends
        fi
        cp downloads/luci*.apk passwall-fw4-apk-a53/luci/ 2>/dev/null || true
        
        echo "FW4 packages organized"

    - name: Create install.sh scripts for FW3 (iptables)
      shell: bash
      run: |
        # FW3 + IPK (OpenWrt)
        cat <<'EOF' > passwall-fw3-ipk-x86/install.sh
        #!/bin/sh
        # Passwall FW3 (iptables) installer for OpenWrt x86_64
        echo "Installing Passwall with FW3 (iptables) for OpenWrt x86_64..."
        
        opkg update
        if [ $? -ne 0 ]; then
            echo "opkg update failed"
            exit 1
        fi
        
        opkg install iptables iptables-zz-legacy \
          iptables-mod-conntrack-extra iptables-mod-iprange \
          iptables-mod-socket iptables-mod-tproxy kmod-ipt-nat \
          ipset ipt2socks
        
        opkg install --force-depends depends/*.ipk
        opkg install --force-depends luci/*.ipk
        
        echo "FW3 Passwall installation completed for OpenWrt"
        EOF
        chmod +x passwall-fw3-ipk-x86/install.sh
        cp passwall-fw3-ipk-x86/install.sh passwall-fw3-ipk-a53/install.sh
        
        # FW3 + APK (Alpine Linux)
        cat <<'EOF' > passwall-fw3-apk-x86/install.sh
        #!/bin/sh
        # Passwall FW3 (iptables) installer for Alpine Linux x86_64
        echo "Installing Passwall with FW3 (iptables) for Alpine Linux x86_64..."
        
        apk update
        if [ $? -ne 0 ]; then
            echo "apk update failed"
            exit 1
        fi
        
        apk add iptables iptables-legacy \
          iptables-mod-conntrack-extra iptables-mod-iprange \
          iptables-mod-socket iptables-mod-tproxy \
          ipset ipt2socks
        
        for pkg in depends/*.apk luci/*.apk; do
            if [ -f "$pkg" ]; then
                apk add --force --allow-untrusted "$pkg"
            fi
        done
        
        echo "FW3 Passwall installation completed for Alpine Linux"
        EOF
        chmod +x passwall-fw3-apk-x86/install.sh
        cp passwall-fw3-apk-x86/install.sh passwall-fw3-apk-a53/install.sh
        
        echo "FW3 install scripts created"

    - name: Create install.sh scripts for FW4 (nftables)
      shell: bash
      run: |
        # FW4 + IPK (OpenWrt)
        cat <<'EOF' > passwall-fw4-ipk-x86/install.sh
        #!/bin/sh
        # Passwall FW4 (nftables) installer for OpenWrt x86_64
        echo "Installing Passwall with FW4 (nftables) for OpenWrt x86_64..."
        
        opkg update
        if [ $? -ne 0 ]; then
            echo "opkg update failed"
            exit 1
        fi
        
        opkg install nftables kmod-nft-socket \
          kmod-nft-tproxy kmod-nft-nat \
          ipt2socks
        
        opkg install --force-depends depends/*.ipk
        opkg install --force-depends luci/*.ipk
        
        echo "FW4 Passwall installation completed for OpenWrt"
        EOF
        chmod +x passwall-fw4-ipk-x86/install.sh
        cp passwall-fw4-ipk-x86/install.sh passwall-fw4-ipk-a53/install.sh
        
        # FW4 + APK (Alpine Linux)
        cat <<'EOF' > passwall-fw4-apk-x86/install.sh
        #!/bin/sh
        # Passwall FW4 (nftables) installer for Alpine Linux x86_64
        echo "Installing Passwall with FW4 (nftables) for Alpine Linux x86_64..."
        
        apk update
        if [ $? -ne 0 ]; then
            echo "apk update failed"
            exit 1
        fi
        
        apk add nftables kmod-nft-socket \
          kmod-nft-tproxy kmod-nft-nat \
          ipt2socks
        
        for pkg in depends/*.apk luci/*.apk; do
            if [ -f "$pkg" ]; then
                apk add --force --allow-untrusted "$pkg"
            fi
        done
        
        echo "FW4 Passwall installation completed for Alpine Linux"
        EOF
        chmod +x passwall-fw4-apk-x86/install.sh
        cp passwall-fw4-apk-x86/install.sh passwall-fw4-apk-a53/install.sh
        
        echo "FW4 install scripts created"

    - name: Move directories to makeself
      shell: bash
      run: |
        mv passwall-fw3-ipk-x86 passwall-fw3-ipk-a53 \
           passwall-fw3-apk-x86 passwall-fw3-apk-a53 \
           passwall-fw4-ipk-x86 passwall-fw4-ipk-a53 \
           passwall-fw4-apk-x86 passwall-fw4-apk-a53 makeself/
        echo "Directories moved to makeself/"

    - name: Create self-extracting packages
      shell: bash
      run: |
        cd makeself
        
        chmod +x makeself.sh
        
        if [ -d "passwall-fw3-ipk-x86" ]; then
          ./makeself.sh passwall-fw3-ipk-x86 passwall-fw3-ipk-x86_64-${{ env.LATEST_TAG }}.run \
            "Passwall FW3 (iptables) for OpenWrt x86_64" ./install.sh
        fi
        
        if [ -d "passwall-fw3-ipk-a53" ]; then
          ./makeself.sh passwall-fw3-ipk-a53 passwall-fw3-ipk-aarch64-${{ env.LATEST_TAG }}.run \
            "Passwall FW3 (iptables) for OpenWrt aarch64" ./install.sh
        fi
        
        if [ -d "passwall-fw3-apk-x86" ]; then
          ./makeself.sh passwall-fw3-apk-x86 passwall-fw3-apk-x86_64-${{ env.LATEST_TAG }}.run \
            "Passwall FW3 (iptables) for Alpine x86_64" ./install.sh
        fi
        
        if [ -d "passwall-fw3-apk-a53" ]; then
          ./makeself.sh passwall-fw3-apk-a53 passwall-fw3-apk-aarch64-${{ env.LATEST_TAG }}.run \
            "Passwall FW3 (iptables) for Alpine aarch64" ./install.sh
        fi
        
        if [ -d "passwall-fw4-ipk-x86" ]; then
          ./makeself.sh passwall-fw4-ipk-x86 passwall-fw4-ipk-x86_64-${{ env.LATEST_TAG }}.run \
            "Passwall FW4 (nftables) for OpenWrt x86_64" ./install.sh
        fi
        
        if [ -d "passwall-fw4-ipk-a53" ]; then
          ./makeself.sh passwall-fw4-ipk-a53 passwall-fw4-ipk-aarch64-${{ env.LATEST_TAG }}.run \
            "Passwall FW4 (nftables) for OpenWrt aarch64" ./install.sh
        fi
        
        if [ -d "passwall-fw4-apk-x86" ]; then
          ./makeself.sh passwall-fw4-apk-x86 passwall-fw4-apk-x86_64-${{ env.LATEST_TAG }}.run \
            "Passwall FW4 (nftables) for Alpine x86_64" ./install.sh
        fi
        
        if [ -d "passwall-fw4-apk-a53" ]; then
          ./makeself.sh passwall-fw4-apk-a53 passwall-fw4-apk-aarch64-${{ env.LATEST_TAG }}.run \
            "Passwall FW4 (nftables) for Alpine aarch64" ./install.sh
        fi
        
        echo "Self-extracting packages created:"
        ls -lh *.run

    - name: Copy files to output directory
      shell: bash
      run: |
        cp makeself/*.run ${{ inputs.OUTPUT_DIR }} 2>/dev/null || true
        echo "Files copied to ${{ inputs.OUTPUT_DIR }}"
        ls -lh ${{ inputs.OUTPUT_DIR }}
