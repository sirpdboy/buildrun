name: "Build Nikki run files"
description: "Build Nikki run file as a reusable composite action (IPK for OpenWrt, APK for Alpine Linux)"
author: "sirpdboy"
branding:
  icon: 'package'
  color: 'green'

inputs:
  OUTPUT_DIR:
    description: "Output directory for run file"
    required: false
    default: "./pakrun"

runs:
  using: "composite"
  steps:
    - name: Create necessary directories
      shell: bash
      run: |
        # IPK (OpenWrt)
        mkdir -p nikki-ipk-x86 nikki-ipk-a53
        # APK (Alpine)
        mkdir -p nikki-apk-x86 nikki-apk-a53
        
        mkdir -p makeself ${{ inputs.OUTPUT_DIR }}
        echo "All directories created"

    - name: Fetch latest release tag from Nikki
      id: fetch_latest_tag
      shell: bash
      run: |
        latest_tag=$(curl -s https://api.github.com/repos/nikkinikki-org/OpenWrt-nikki/releases/latest | jq -r '.tag_name')
        echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
        echo "Latest tag: $latest_tag"

    - name: Clone makeself repository
      shell: bash
      run: |
        if [ ! -d "makeself/.git" ]; then
          git clone https://github.com/megastep/makeself.git makeself/
        fi
        chmod +x makeself/makeself.sh

    - name: Download latest Nikki files
      shell: bash
      run: |
        rm -rf downloads
        mkdir -p downloads && cd downloads
        
        RELEASE_INFO=$(curl -s https://api.github.com/repos/nikkinikki-org/OpenWrt-nikki/releases/latest)
        
        X86_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | test("nikki_x86_64-openwrt-24.10.*\\.tar\\.gz$")) | .browser_download_url')
        if [ -n "$X86_URL" ] && [ "$X86_URL" != "null" ]; then
          echo "Downloading x86_64 package..."
          curl -L -f -o nikki_x86_64-openwrt-24.10.tar.gz "$X86_URL"
        fi

        AARCH64_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | test("nikki_aarch64_cortex-a53-openwrt-24.10.*\\.tar\\.gz$")) | .browser_download_url')
        if [ -n "$AARCH64_URL" ] && [ "$AARCH64_URL" != "null" ]; then
          echo "Downloading aarch64 package..."
          curl -L -f -o nikki_aarch64_cortex-a53-openwrt-24.10.tar.gz "$AARCH64_URL"
        fi
        
        X86_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | test("nikki_x86_64-openwrt-25.12.*\\.tar\\.gz$")) | .browser_download_url')
        if [ -n "$X86_URL" ] && [ "$X86_URL" != "null" ]; then
          echo "Downloading x86_64 package..."
          curl -L -f -o nikki_x86_64-openwrt-25.12.tar.gz "$X86_URL"
        fi
        
        AARCH64_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | test("nikki_aarch64_cortex-a53-openwrt-25.12.*\\.tar\\.gz$")) | .browser_download_url')
        if [ -n "$AARCH64_URL" ] && [ "$AARCH64_URL" != "null" ]; then
          echo "Downloading aarch64 package..."
          curl -L -f -o nikki_aarch64_cortex-a53-openwrt-25.12.tar.gz "$AARCH64_URL"
        fi

        tar --one-top-level=nikki_aarch64_cortex-a53-openwrt-24.10 -xvzf nikki_aarch64_cortex-a53-openwrt-24.10.tar.gz
        tar --one-top-level=nikki_x86_64-openwrt-24.10 -xvzf nikki_x86_64-openwrt-24.10.tar.gz

        tar --one-top-level=nikki_aarch64_cortex-a53-openwrt-25.12 -xvzf nikki_aarch64_cortex-a53-openwrt-25.12.tar.gz
        tar --one-top-level=nikki_x86_64-openwrt-25.12 -xvzf nikki_x86_64-openwrt-25.12.tar.gz
        echo "Download completed"
        ls -la

    - name: Organize files for x86_64
      shell: bash
      run: |
        X86_DIR=$(find downloads -maxdepth 1 -type d -name "nikki_x86_64-openwrt-24.10*" 2>/dev/null | head -1)
        echo 'dir: '$X86_DIR
        if [ -n "$X86_DIR" ] && [ -d "$X86_DIR" ]; then
          cp "$X86_DIR"/*.ipk nikki-ipk-x86/ 2>/dev/null || true
          for dir in nikki-ipk-x86; do
            pushd "$dir" >/dev/null || continue
            for file in *~*.ipk; do
              [ -e "$file" ] || continue
              new_file="$(echo "$file" | tr -d '~')"
              if [ ! -e "$new_file" ]; then
                mv "$file" "$new_file"
                echo "Renamed: $file -> $new_file"
              fi
            done
            popd >/dev/null
          done
          echo "x86_64 files organized"
        else
          echo "x86_64 directory not found"
        fi
        X86_DIR=$(find downloads -maxdepth 1 -type d -name "nikki_x86_64-openwrt-25.12*" 2>/dev/null | head -1)
        echo 'dir: '$X86_DIR
        if [ -n "$X86_DIR" ] && [ -d "$X86_DIR" ]; then
          cp "$X86_DIR"/*.apk nikki-apk-x86/ 2>/dev/null || true
          
          for dir in nikki-apk-x86; do
            pushd "$dir" >/dev/null || continue
            for file in *~*.ipk; do
              [ -e "$file" ] || continue
              new_file="$(echo "$file" | tr -d '~')"
              if [ ! -e "$new_file" ]; then
                mv "$file" "$new_file"
                echo "Renamed: $file -> $new_file"
              fi
            done
            popd >/dev/null
          done
          echo "x86_64 files organized"
        else
          echo "x86_64 directory not found"
        fi

    - name: Organize files for aarch64
      shell: bash
      run: |
        AARCH64_DIR=$(find downloads -maxdepth 1 -type d -name "nikki_aarch64_cortex-a53-openwrt-24.10*" 2>/dev/null | head -1)

        echo 'dir: '$AARCH64_DIR
        if [ -n "$AARCH64_DIR" ] && [ -d "$AARCH64_DIR" ]; then
          cp "$AARCH64_DIR"/*.ipk nikki-ipk-a53/ 2>/dev/null || true
          
          for dir in nikki-ipk-a53; do
            pushd "$dir" >/dev/null || continue
            for file in *~*.ipk; do
              [ -e "$file" ] || continue
              new_file="$(echo "$file" | tr -d '~')"
              if [ ! -e "$new_file" ]; then
                mv "$file" "$new_file"
                echo "Renamed: $file -> $new_file"
              fi
            done
            popd >/dev/null
          done
          echo "aarch64 files organized"
        else
          echo "aarch64 directory not found"
        fi
        AARCH64_DIR=$(find downloads -maxdepth 1 -type d -name "nikki_aarch64_cortex-a53-openwrt-25.12*" 2>/dev/null | head -1)

        echo 'dir: '$AARCH64_DIR
        if [ -n "$AARCH64_DIR" ] && [ -d "$AARCH64_DIR" ]; then
          cp "$AARCH64_DIR"/*.apk nikki-apk-a53/ 2>/dev/null || true
          
          for dir in nikki-apk-a53; do
            pushd "$dir" >/dev/null || continue
            for file in *~*.ipk; do
              [ -e "$file" ] || continue
              new_file="$(echo "$file" | tr -d '~')"
              if [ ! -e "$new_file" ]; then
                mv "$file" "$new_file"
                echo "Renamed: $file -> $new_file"
              fi
            done
            popd >/dev/null
          done
          echo "aarch64 files organized"
        else
          echo "aarch64 directory not found"
        fi
    - name: Create install.sh scripts for IPK (OpenWrt)
      shell: bash
      run: |
        cat <<'EOF' > nikki-ipk-x86/install.sh
        #!/bin/sh
        # Nikki installer for OpenWrt x86_64
        echo "=========================================="
        echo "Nikki Installer for OpenWrt x86_64"
        echo "=========================================="
        
        echo "[1/3] Updating package lists..."
        opkg update
        if [ $? -ne 0 ]; then
            echo "⚠ opkg update failed, continuing..."
        fi
        
        echo "[2/3] Installing Nikki package..."
        opkg install --force-depends --force-overwrite *.ipk
        if [ $? -eq 0 ]; then
            echo "✓ Nikki installed successfully"
        else
            echo "⚠ Nikki installed with warnings"
        fi
        
        echo "[3/3] Installation completed"
        echo "=========================================="
        echo "Nikki installation completed!"
        echo "Please restart Nikki service: /etc/init.d/nikki restart"
        echo "Or visit Luci -> Services -> Nikki to configure"
        EOF
        chmod +x nikki-ipk-x86/install.sh
        cp nikki-ipk-x86/install.sh nikki-ipk-a53/install.sh
        echo "IPK install scripts created"

    - name: Create install.sh scripts for APK (Alpine Linux)
      shell: bash
      run: |
        cat <<'EOF' > nikki-apk-x86/install.sh
        #!/bin/sh
        # Nikki installer for Alpine Linux x86_64
        echo "=========================================="
        echo "Nikki Installer for Alpine Linux x86_64"
        echo "=========================================="
        
        echo "[1/3] Updating package lists..."
        apk update
        if [ $? -ne 0 ]; then
            echo "⚠ apk update failed, continuing..."
        fi
        
        echo "[2/3] Installing Nikki package..."
        for pkg in *.apk; do
            if [ -f "$pkg" ]; then
                apk add --force --allow-untrusted "$pkg"
            fi
        done
        
        if [ -f *.ipk ] && [ ! -f *.apk ]; then
            echo "No APK files found, trying IPK with opkg..."
            opkg install --force-depends *.ipk 2>/dev/null || true
        fi
        
        echo "[3/3] Installation completed"
        echo "=========================================="
        echo "Nikki installation completed for Alpine!"
        echo "Please restart Nikki service: rc-service nikki restart"
        EOF
        chmod +x nikki-apk-x86/install.sh
        cp nikki-apk-x86/install.sh nikki-apk-a53/install.sh
        echo "APK install scripts created"

    - name: Move directories to makeself
      shell: bash
      run: |
        mv nikki-ipk-x86 makeself/
        mv nikki-ipk-a53 makeself/
        mv nikki-apk-x86 makeself/
        mv nikki-apk-a53 makeself/
        echo "Directories moved to makeself/"

    - name: Create self-extracting packages
      shell: bash
      run: |
        cd makeself
        
        # IPK 包 (OpenWrt)
        if [ -d "nikki-ipk-x86" ] && [ "$(ls -A nikki-ipk-x86)" ]; then
          ./makeself.sh nikki-ipk-x86/ nikki-fw4-ipk-x86_64-${{ env.LATEST_TAG }}.run \
            "Nikki installer for OpenWrt x86_64" ./install.sh
          echo "Created: nikki-ipk-x86_64-${{ env.LATEST_TAG }}.run"
        fi
        
        if [ -d "nikki-ipk-a53" ] && [ "$(ls -A nikki-ipk-a53)" ]; then
          ./makeself.sh nikki-ipk-a53/ nikki-fw4-ipk-aarch64-${{ env.LATEST_TAG }}.run \
            "Nikki installer for OpenWrt aarch64" ./install.sh
          echo "Created: nikki-ipk-aarch64-${{ env.LATEST_TAG }}.run"
        fi
        
        # APK 包 (Alpine Linux)
        if [ -d "nikki-apk-x86" ] && [ "$(ls -A nikki-apk-x86)" ]; then
          ./makeself.sh nikki-apk-x86/ nikki-fw4-apk-x86_64-${{ env.LATEST_TAG }}.run \
            "Nikki installer for Alpine Linux x86_64" ./install.sh
          echo "Created: nikki-apk-x86_64-${{ env.LATEST_TAG }}.run"
        fi
        
        if [ -d "nikki-apk-a53" ] && [ "$(ls -A nikki-apk-a53)" ]; then
          ./makeself.sh nikki-apk-a53/ nikki-fw4-apk-aarch64-${{ env.LATEST_TAG }}.run \
            "Nikki installer for Alpine Linux aarch64" ./install.sh
          echo "Created: nikki-apk-aarch64-${{ env.LATEST_TAG }}.run"
        fi
        
        echo "All packages created:"
        ls -lh *.run

    - name: Copy files to output directory
      shell: bash
      run: |
        cp makeself/*.run ${{ inputs.OUTPUT_DIR }} 2>/dev/null || true
        echo "Files copied to ${{ inputs.OUTPUT_DIR }}"
        ls -lh ${{ inputs.OUTPUT_DIR }}
